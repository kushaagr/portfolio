<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Prevents a flash of white by matching your main site's theme color if needed -->
    <meta name="theme-color" content="#ffffff"> 
    <title>Loading...</title>
    <!-- 1. Legacy Fallback (Default Favicon) -->
    <link rel="icon" href="/favicon.ico" sizes="any">
    <!-- 2. High-Res PNG for Standard Browsers & Devices -->
    <link rel="icon" href="/icon-32x32.png" type="image/png" sizes="32x32">
    <link rel="icon" href="/icon-192x192.png" type="image/png" sizes="192x192">
    <link rel="icon" href="/icon-512x512.png" type="image/png" sizes="512x512">
    <!-- 3. Apple Touch Icon (For iOS Home Screen Shortcuts) -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180">

    <script>
        // Use location.replace() so the redirecting page doesn't get stuck in the session history.
        // This ensures the "Back" button works perfectly for the user.
        window.location.replace("./ui-dev.html");
    </script>
    <!-- Fallback if JS is disabled. Keeping it at 0 seconds for speed. -->
    <meta http-equiv="refresh" content="0; url=./ui-dev.html">
</head>
<body style="background-color: #ffffff; margin: 0; padding: 0;">
    <!-- Keeps the body completely empty so nothing flashes on the screen during the transition -->
</body>
